services:
  - type: web
    name: foodfeed-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r FoodFeed/requirements.txt
    startCommand: gunicorn FoodFeed.app:app -b 0.0.0.0:$PORT --workers 2 --timeout 60
    disk:
      name: foodfeed-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/foodfeed.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: OPENAI_MODEL
        value: gpt-5.4-nano
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NOMINATIM_CONTACT_EMAIL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: foodfeed-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
